<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Beyond The Verse</title>
    <script type="text/javascript">
      // 🌟 GitHub Pages SPA Hack - Redirect Script 🌟
      // यह स्क्रिप्ट 404 एरर आने पर यूज़र को सही पाथ के साथ वापस index.html पर भेज देती है
      
      var segmentCount = 1; // 1 इसलिए क्योंकि रिपॉजिटरी का नाम '/beyondtheverse' है
      
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
